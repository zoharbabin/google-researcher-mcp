name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the sections below so we can reproduce and fix the issue quickly.

        **Security vulnerabilities**: If this is a security issue, please use [private vulnerability reporting](https://github.com/zoharbabin/google-researcher-mcp/security/advisories/new) instead.

  - type: input
    id: version
    attributes:
      label: Version
      description: "Which version are you using? Run: `npm list google-researcher-mcp` or check `package.json`"
      placeholder: "e.g. 6.1.0"
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport mode
      description: How is the server running?
      options:
        - STDIO (default — Claude Desktop, Claude Code, Cursor, etc.)
        - HTTP/SSE (web clients, custom integrations)
        - Docker
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: MCP client
      description: Which client are you using to connect?
      options:
        - Claude Desktop
        - Claude Code (CLI)
        - Cursor
        - Windsurf
        - Cline / Roo Code
        - MCP Inspector
        - Custom client
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      description: "Run: `node --version`"
      placeholder: "e.g. v20.15.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: "OS and version (e.g. macOS 15.2, Ubuntu 24.04, Windows 11)"
      placeholder: "e.g. macOS 15.2"
    validations:
      required: true

  - type: dropdown
    id: tool
    attributes:
      label: Which tool is affected?
      description: Select the MCP tool where the bug occurs, if applicable.
      options:
        - google_search
        - scrape_page
        - search_and_scrape
        - google_image_search
        - google_news_search
        - academic_search
        - patent_search
        - sequential_search
        - Server startup / transport
        - Not tool-specific
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Configure server with ...
        2. Call tool `google_search` with ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages, stack traces, or logs. **Redact API keys and sensitive data.**
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might help (screenshots, configuration, workarounds tried).
