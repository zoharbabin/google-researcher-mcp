name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please fill out the sections below.
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version are you using? (`npm list google-researcher-mcp`)
      placeholder: "6.1.0"
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - STDIO (Claude Desktop, Claude Code, Cursor, etc.)
        - HTTP/SSE
        - Docker
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: MCP Client
      options:
        - Claude Desktop
        - Claude Code
        - Cursor
        - Windsurf
        - Cline / Roo Code
        - Custom client
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error messages or logs (redact API keys).
      render: shell
